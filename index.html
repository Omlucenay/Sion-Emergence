const {useState,useEffect,useRef,useCallback}=React;

// French apostrophe helper — avoids JS string escape issues
const A = "\u2019";

const TWEAK_DEFAULTS=/*EDITMODE-BEGIN*/{"accentColor":"#E8725A","heroTheme":"forest","showCta":true}/*EDITMODE-END*/;

function useReveal(ref){
  useEffect(()=>{
    const root = ref && ref.current ? ref.current : document;
    const els = root.querySelectorAll(".reveal");
    const obs = new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting) e.target.classList.add("on");});},{threshold:.1});
    els.forEach(el=>obs.observe(el));
    return()=>obs.disconnect();
  },[ref]);
}

const Btn = ({children, v="primary", size="md", onClick, full, style:sx}) => {
  const [h, sh] = useState(false);

    ghost: {background:"transparent", color: h?"#2B5446":"#3A5048", border:"none"}

    <button onClick={onClick} onMouseEnter={()=>sh(true)} onMouseLeave={()=>sh(false)}

};

const NAV_ITEMS = [
  {id:"home", label:"Accueil"},
  {id:"about", label:"Le projet"},
  {id:"academy", label:"Sion Academy"},
  {id:"joyclub", label:"Joy Club"},

const Nav = ({page, go}) => {
  const [sc, setSc] = useState(false);
  const [open, setOpen] = useState(false);
  const dark = page === "home" && !sc;
  useEffect(()=>{
    const fn = () => setSc(window.scrollY > 40);
    window.addEventListener("scroll", fn);
    return () => window.removeEventListener("scroll", fn);
  },[]);
  return (
    <nav style={{position:"fixed", top:0, left:0, right:0, zIndex:300, height:68, display:"flex", alignItems:"center", padding:"0 32px", background: sc?"rgba(245,244,239,.97)":"transparent", backdropFilter: sc?"blur(14px)":"none", boxShadow: sc?"0 2px 24px rgba(27,60,46,.08)":"none", transition:"all .3s ease"}}>
      <div style={{maxWidth:1280, margin:"0 auto", width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between"}}>
        <button onClick={()=>{go("home"); setOpen(false);}} style={{background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", gap:1}}>
          <img src="assets/logo.png" alt="Sion" style={{height:38, filter: dark?"brightness(0) invert(1)":"none", transition:"filter .3s"}}/>
          <span style={{fontFamily:"Montserrat,sans-serif", fontSize:8, fontWeight:700, letterSpacing:".18em", textTransform:"uppercase", color: dark?"rgba(255,255,255,.5)":"#7A9490"}}>Émergence</span>
        </button>

        <div className="hide-mob" style={{display:"flex", gap:22, alignItems:"center"}}>
          {NAV_ITEMS.slice(1,6).map(n => (
            <button key={n.id} onClick={()=>go(n.id)} style={{background:"none", border:"none", cursor:"pointer", fontFamily:"Montserrat,sans-serif", fontSize:10, fontWeight:700, letterSpacing:".09em", textTransform:"uppercase", color: dark?"rgba(255,255,255,.8)":(page===n.id?"#2B5446":"#3A5048"), borderBottom: page===n.id?"2px solid #E8725A":"2px solid transparent", paddingBottom:2, transition:"all .18s"}}>
              {n.label}
            </button>
          ))}
          <Btn v="coral" size="sm" onClick={()=>go("candidatures")}>Candidatures</Btn>
        </div>

        <button onClick={()=>setOpen(!open)} className="show-mob" style={{background:"none", border:"none", cursor:"pointer", flexDirection:"column", gap:5, padding:4}}>
          {[0,1,2].map(i => <span key={i} style={{display:"block", width:22, height:2, background: dark?"#fff":"#1A2E29", borderRadius:2}}/>)}
        </button>
      </div>
      {open && (
        <div style={{position:"absolute", top:68, left:0, right:0, background:"#fff", boxShadow:"0 10px 48px rgba(27,60,46,.15)", padding:"24px 28px", display:"flex", flexDirection:"column", gap:4}}>
          {NAV_ITEMS.map(n => (
            <button key={n.id} onClick={()=>{go(n.id); setOpen(false);}} style={{background:"none", border:"none", cursor:"pointer", textAlign:"left", fontFamily:"Montserrat,sans-serif", fontSize:12, fontWeight:700, letterSpacing:".09em", textTransform:"uppercase", color: page===n.id?"#2B5446":"#3A5048", padding:"10px 0", borderBottom:"1px solid #D6D2CA"}}>
              {n.label}
            </button>
          ))}
          <Btn v="coral" size="md" onClick={()=>{go("candidatures"); setOpen(false);}} full style={{marginTop:12}}>Candidatures →</Btn>
        </div>
      )}
    </nav>
  );
};

                <div className="mob-1col" style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:14}}>
                  {[["Prénom","prenom","text","Marie"], ["Nom","nom","text","Dupont"]].map(([l, k, t, ph]) => (
                    <div key={k}>
                      <label>{l} *</label>
                      <input type={t} placeholder={ph} value={form[k]} onChange={e=>{setForm({...form, [k]:e.target.value}); setErr({...err, [k]:null});}} style={{borderColor: err[k]?"#E8725A":undefined}}/>

                  </div>
                ))}
                <div style={{marginBottom:14}}>
                  <label>Offre souhaitée *</label>
                  <select value={form.offre} onChange={e=>{setForm({...form, offre:e.target.value}); setErr({...err, offre:null});}} style={{borderColor: err.offre?"#E8725A":undefined}}>

      </S>
      <Footer go={go}/>

};

/* ───────── TWEAKS ───────── */
const TweaksPanel = ({tweaks, setTweaks, visible}) => {
  if (!visible) return null;
  const set = (k, v) => {
    const t = {...tweaks, [k]:v};
    setTweaks(t);
    window.parent.postMessage({type:"__edit_mode_set_keys", edits:t}, "*");
  };
  return (
    <div style={{position:"fixed", bottom:20, right:20, zIndex:9999, background:"white", borderRadius:16, boxShadow:"0 8px 48px rgba(0,0,0,.14)", padding:"20px 24px", width:260}}>
      <p style={{fontFamily:"Montserrat,sans-serif", fontSize:10, fontWeight:700, letterSpacing:".12em", textTransform:"uppercase", color:"#7A9490", marginBottom:16}}>Tweaks</p>
      <p style={{fontFamily:"Montserrat,sans-serif", fontSize:9, fontWeight:700, letterSpacing:".08em", textTransform:"uppercase", color:"#3A5048", marginBottom:8}}>Couleur accent</p>
      <div style={{display:"flex", gap:8, marginBottom:16, flexWrap:"wrap"}}>
        {["#E8725A","#3E9FA1","#2B5446","#C49A14"].map(c => (
          <div key={c} onClick={()=>set("accentColor", c)} style={{width:28, height:28, borderRadius:"50%", background:c, cursor:"pointer", border: tweaks.accentColor===c?"3px solid #1A2E29":"3px solid transparent"}}/>
        ))}
      </div>
      <p style={{fontFamily:"Montserrat,sans-serif", fontSize:9, fontWeight:700, letterSpacing:".08em", textTransform:"uppercase", color:"#3A5048", marginBottom:8}}>Thème hero</p>
      <div style={{display:"flex", gap:8, marginBottom:16}}>
        {[["forest","#2B5446"], ["sand","#E9DBCA"], ["teal","#3E9FA1"]].map(([k, c]) => (
          <div key={k} onClick={()=>set("heroTheme", k)} style={{width:28, height:28, borderRadius:"50%", background:c, cursor:"pointer", border: tweaks.heroTheme===k?"3px solid #1A2E29":"3px solid transparent"}}/>
        ))}
      </div>
      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
        <p style={{fontFamily:"Montserrat,sans-serif", fontSize:9, fontWeight:700, letterSpacing:".08em", textTransform:"uppercase", color:"#3A5048"}}>Bouton CTA</p>
        <div onClick={()=>set("showCta", !tweaks.showCta)} style={{width:40, height:22, borderRadius:11, background: tweaks.showCta?"#2B5446":"#D6D2CA", cursor:"pointer", position:"relative", transition:"background .2s"}}>
          <div style={{position:"absolute", top:3, left: tweaks.showCta?20:3, width:16, height:16, borderRadius:"50%", background:"white", transition:"left .2s", boxShadow:"0 1px 4px rgba(0,0,0,.2)"}}/>
        </div>
      </div>
    </div>
  );
};

/* ───────── APP ───────── */
const App = () => {
  const [page, setPage] = useState(() => localStorage.getItem("se_page") || "home");
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOn, setTweaksOn] = useState(false);

  const go = useCallback((pg) => {
    setPage(pg);
    localStorage.setItem("se_page", pg);
    window.scrollTo({top:0, behavior:"instant"});
  }, []);

  useEffect(() => {
    const fn = (e) => {
      if (e.data && e.data.type === "__activate_edit_mode") setTweaksOn(true);
      if (e.data && e.data.type === "__deactivate_edit_mode") setTweaksOn(false);
    };
    window.addEventListener("message", fn);
    window.parent.postMessage({type:"__edit_mode_available"}, "*");
    return () => window.removeEventListener("message", fn);
  }, []);

  const pages = {
    home: <HomePage go={go}/>,
    about: <AboutPage go={go}/>,
    academy: <AcademyPage go={go}/>,
    joyclub: <JoyClubPage go={go}/>,
    parentlab: <ParentLabPage go={go}/>,
    dispositifs: <DispositifsPage go={go}/>,
    candidatures: <CandidaturesPage go={go}/>,
    partenaires: <PartenairesPage go={go}/>
  };

  return (
    <div>
      <Nav page={page} go={go}/>
      {pages[page] || pages.home}
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksOn}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
