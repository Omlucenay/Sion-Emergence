*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow-x:hidden;text-rendering:optimizeLegibility;font-feature-settings:"ss01","cv02","cv11"}
:root{
  /* Palette v2 - éditorial & tamisée */
  --paper:#FAF7F0; --paper-d:#F2ECE0; --paper-s:#F7F2E5;
  --ink:#1B2826; --ink-s:#2F3E3A; --ink-m:#657570; --ink-l:#A8B8B2;
  --forest:#2F5D50; --forest-d:#1F4236; --forest-l:#528C7C; --forest-b:#3D8F72; --forest-bl:#52B08A; --mist:#E6EEE9; --mist-b:#CDEADA;
  --coral:#E8725A; --coral-d:#C85540; --blush:#F5E1D8; --blush-p:#FCF2ED;
  --teal:#4FA3A5; --teal-d:#336F71; --teal-l:#D9EDEE;
  --gold:#C49A14; --gold-d:#8F6F0A; --gold-l:#F4E7A8; --gold-p:#FBF4D4;
  --sun:#F5C83A; --sun-l:#FFE58F; --sun-d:#E3A800;
  --sand:#EEDCC7; --sand-d:#D6C4AA; --sand-l:#F7EEE0;
  --line:#E5DED0;
  /* Radii */
  --r1:10px; --r2:16px; --r3:22px; --r4:30px; --r5:40px; --r-pill:999px;
  /* Ombres soft, éditorial */
  --sh1:0 1px 2px rgba(27,40,38,.05);
  --sh2:0 4px 12px -2px rgba(27,40,38,.08),0 2px 6px -1px rgba(27,40,38,.04);
  --sh3:0 12px 32px -8px rgba(27,40,38,.14),0 4px 12px -4px rgba(27,40,38,.08);
  --sh4:0 24px 56px -16px rgba(27,40,38,.22),0 8px 24px -8px rgba(27,40,38,.12);
  --sh5:0 40px 80px -24px rgba(27,40,38,.28),0 12px 32px -12px rgba(27,40,38,.14);
  --sh-ring:0 0 0 3px rgba(232,114,90,.22),0 0 0 5px rgba(232,114,90,.1);
  /* Easings */
  --spring:cubic-bezier(.34,1.3,.64,1);
  --out:cubic-bezier(.22,1,.36,1);
  --inout:cubic-bezier(.45,0,.55,1);
}

/* --- Typographie éditoriale --- */
.display{font-family:'Fraunces',serif;font-optical-sizing:auto;font-weight:500;letter-spacing:-.035em;line-height:.95}
.editorial{font-family:'Fraunces',serif;font-weight:400;font-style:italic;letter-spacing:-.01em}
.serif{font-family:'Playfair Display',serif;letter-spacing:-.02em;line-height:1.1}
.sans{font-family:'Inter',sans-serif;letter-spacing:-.005em}
.joy{font-family:'Fredoka',sans-serif}
.hand{font-family:'Caveat',cursive;letter-spacing:.005em}
.kicker{font-family:'Inter',sans-serif;font-weight:600;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-m)}

h1,h2,h3,h4,h5,h6{color:var(--ink)}
p{line-height:1.65;color:var(--ink-s)}
a{color:inherit;text-decoration:none}

/* --- Paper grain texture (subtle) --- */
.grain::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.35;mix-blend-mode:multiply;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180' viewBox='0 0 180 180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 .2  0 0 0 0 .15  0 0 0 0 .1  0 0 0 .1 0'/></filter><rect width='180' height='180' filter='url(%23n)'/></svg>")}

/* --- Reveal & motion --- */
.reveal{opacity:0;transform:translateY(24px);transition:opacity .7s var(--out),transform .7s var(--out)}
.reveal.on{opacity:1;transform:none}
.d1{transition-delay:80ms}.d2{transition-delay:160ms}.d3{transition-delay:240ms}.d4{transition-delay:320ms}.d5{transition-delay:400ms}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important}
  .reveal{opacity:1;transform:none}
}

/* --- Lift utility --- */
.tile{transition:transform .4s var(--spring),box-shadow .4s var(--out);will-change:transform;transform-style:preserve-3d}
.tile:hover{transform:translateY(-8px)}

/* --- 3D perspective tilt --- */
.scene-3d{perspective:1400px}
.tilt{transform-style:preserve-3d;transition:transform .6s var(--out);will-change:transform}
.tilt-hover:hover{transform:rotateX(6deg) rotateY(-6deg) translateZ(20px)}

/* --- Float animations (subtle) --- */
@keyframes float-y{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes float-slow{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-8px) rotate(2deg)}}
@keyframes spin-slow{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes pulse-glow{0%,100%{filter:drop-shadow(0 0 20px rgba(245,200,58,.45))}50%{filter:drop-shadow(0 0 40px rgba(245,200,58,.75))}}
@keyframes orbit{from{transform:rotate(0) translateX(20px) rotate(0)}to{transform:rotate(360deg) translateX(20px) rotate(-360deg)}}

.float-y{animation:float-y 4s var(--inout) infinite}
.float-slow{animation:float-slow 6s var(--inout) infinite}
.spin-slow{/* animation disabled */}
.glow{animation:pulse-glow 3.5s var(--inout) infinite}
.orbit{animation:orbit 18s linear infinite}

/* --- Parallax depth layers --- */
.depth-near{transform:translateZ(40px)}
.depth-mid{transform:translateZ(20px)}
.depth-far{transform:translateZ(-30px)}

/* --- 3D card flip (subtle lift w/ rotation) --- */
.card-3d{transition:transform .5s var(--spring),box-shadow .5s var(--out);transform-style:preserve-3d}
.card-3d:hover{transform:perspective(1000px) rotateX(3deg) rotateY(-3deg) translateY(-6px)}

/* --- 3D Floating objects --- */
@keyframes rot3d{0%{transform:rotateX(0deg) rotateY(0deg)}100%{transform:rotateX(360deg) rotateY(360deg)}}
@keyframes float3d{0%,100%{transform:translateY(0) rotateZ(0deg)}50%{transform:translateY(-16px) rotateZ(4deg)}}
.rot3d{transform-style:preserve-3d}
.float3d{animation:float3d 6s var(--inout) infinite;transform-style:preserve-3d}
.obj3d{transform-style:preserve-3d;perspective:800px;will-change:transform}

/* --- Gradient living green background (joyful) --- */
.living-forest{background:linear-gradient(135deg,#52B08A 0%,#3D8F72 40%,#2F5D50 80%,#1F4236 100%)}
.living-forest::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 15% 15%,rgba(245,200,58,.32),transparent 42%),radial-gradient(circle at 88% 82%,rgba(232,114,90,.18),transparent 48%),radial-gradient(circle at 75% 15%,rgba(82,176,138,.25),transparent 38%);pointer-events:none}

/* --- 3D nav item lift --- */
.nav-3d{position:relative;transition:transform .3s var(--spring),background .2s var(--out),color .2s var(--out);transform-style:preserve-3d}
.nav-3d:hover{transform:perspective(600px) rotateX(-8deg) translateY(-3px) translateZ(6px)}
.nav-3d::after{content:"";position:absolute;inset:-2px;border-radius:999px;background:linear-gradient(135deg, rgba(232,114,90,.0),rgba(245,200,58,.0));opacity:0;transition:opacity .25s var(--out);z-index:-1}
.nav-3d:hover::after{opacity:1;background:linear-gradient(135deg, rgba(232,114,90,.08),rgba(245,200,58,.14))}

/* --- Button press --- */
button{font-family:inherit}
button:focus-visible, a:focus-visible{outline:none;box-shadow:var(--sh-ring);border-radius:var(--r-pill)}

/* --- Form --- */
input, select, textarea{width:100%;font-family:'Inter',sans-serif;font-size:15px;color:var(--ink);background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:14px 18px;outline:none;transition:border-color .2s var(--out),box-shadow .2s var(--out)}
input:hover, select:hover, textarea:hover{border-color:var(--sand-d)}
input:focus, select:focus, textarea:focus{border-color:var(--forest);box-shadow:0 0 0 3px rgba(47,93,80,.12)}
textarea{resize:vertical;min-height:120px;line-height:1.6}
label{font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-m);display:block;margin-bottom:8px}
::selection{background:rgba(232,114,90,.25);color:var(--ink)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--paper)}
::-webkit-scrollbar-thumb{background:var(--sand-d);border-radius:10px;border:2px solid var(--paper)}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}

/* --- Responsive --- */
.show-mob{display:none}
@media(max-width:768px){
  .hide-mob{display:none!important}
  .mob-1col{grid-template-columns:1fr!important}
  .mob-stack{flex-direction:column!important}
  .show-mob{display:flex!important}
  h1.display-xl{font-size:48px!important}
  h2.display-lg{font-size:34px!important}
}

/* --- Custom utilities --- */
.underline-hand{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 12' preserveAspectRatio='none'><path d='M2 8 Q75 2 150 6 T298 5' stroke='%23E8725A' stroke-width='3' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:0 100%;background-size:100% 8px;padding-bottom:10px}

.dotted-arrow{background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 20'><path d='M2 10 Q20 2 40 10 T78 10' stroke='%232F5D50' stroke-width='2' stroke-dasharray='2 4' fill='none' stroke-linecap='round'/><polyline points='72 5 78 10 72 15' stroke='%232F5D50' stroke-width='2' fill='none' stroke-linecap='round'/></svg>") center/contain no-repeat;width:80px;height:20px;display:inline-block}

@keyframes slide{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.marquee-track{animation:slide 40s linear infinite}

/* Backdrop glass for liquid glass touches */
.glass{background:rgba(250,247,240,.72);backdrop-filter:saturate(1.4) blur(16px);-webkit-backdrop-filter:saturate(1.4) blur(16px);border:1px solid rgba(255,255,255,.5)}
.glass-dark{background:rgba(31,66,54,.55);backdrop-filter:saturate(1.3) blur(16px);-webkit-backdrop-filter:saturate(1.3) blur(16px);border:1px solid rgba(255,255,255,.08)}

/* Polaroid */
.polaroid{background:#fff;padding:14px 14px 54px;box-shadow:0 20px 50px -16px rgba(27,40,38,.22),0 6px 12px -4px rgba(27,40,38,.08);position:relative}
.polaroid::after{content:"";position:absolute;left:50%;top:-8px;transform:translateX(-50%) rotate(-1deg);width:72px;height:16px;background:rgba(232,114,90,.35);border-radius:2px}
</style>
